<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOps ИДЗ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e6e6e6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #1a1d27;
      border: 1px solid #2e3347;
      border-radius: 12px;
      padding: 48px 64px;
      text-align: center;
      max-width: 520px;
      width: 90%;
    }
    .badge {
      display: inline-block;
      background: #fc6d26;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #ffffff;
    }
    p {
      font-size: 15px;
      color: #9098b1;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .stack {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .tag {
      background: #252a3a;
      border: 1px solid #3a4060;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      color: #7c85a8;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">GitLab CI/CD</span>
    <h1>DevOps ИДЗ</h1>
    <p>Nginx-контейнер, собранный через GitLab CI и опубликованный в GitLab Registry.</p>
    <div class="stack">
      <span class="tag">Docker</span>
      <span class="tag">Nginx</span>
      <span class="tag">GitLab CI</span>
      <span class="tag">Ansible</span>
    </div>
  </div>
</body>
</html>
